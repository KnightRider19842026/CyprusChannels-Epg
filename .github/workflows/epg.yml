name: Cyprus EPG Auto

on:
  schedule:
    - cron: "0 2 * * *"  # κάθε μέρα 02:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install lxml
      - name: Run EPG script
        run: python epg.py
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add epg.xml
          git commit -m "Auto update Cyprus EPG" || echo "No changes"
          git push
